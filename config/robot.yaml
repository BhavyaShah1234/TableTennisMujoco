# FR3 Robot Configuration
# All parameters extracted from scene.xml

robot:
  name: "fr3"
  n_dof: 7
  
  # Joint names (in order)
  joint_names:
    - "fr3_joint1"
    - "fr3_joint2"
    - "fr3_joint3"
    - "fr3_joint4"
    - "fr3_joint5"
    - "fr3_joint6"
    - "fr3_joint7"
  
  # Joint limits (radians)
  joint_limits:
    lower: [-2.9007, -1.8326, -2.9007, -3.0718, -2.8774, -0.0175, -3.0543]
    upper: [2.9007, 1.8326, 2.9007, -0.0698, 2.8774, 3.7525, 3.0543]
  
  # Velocity limits (rad/s)
  velocity_limits: [2.62, 2.62, 2.62, 2.62, 5.26, 4.18, 5.26]
  
  # Torque limits (Nm)
  torque_limits: [87, 87, 87, 87, 87, 87, 87]

  # Robot base position in world frame (x, y, z)
  base_position: [1.5, 0.0, 0.76]
  
  # Home configuration (safe starting position)
  # Keep this synchronized with assets/scene.xml keyframe "home".
  # Joint 4 (-1.9 vs -pi/2): deeper elbow bend lowers paddle closer to table height.
  # Joint 7 (0.785 = pi/4): wrist roll that orients the paddle face toward the net.
  home_position: [0.0, 0.0, 0.0, -1.9, 0.0, 1.5708, 0.785]

end_effector:
  name: "paddle"
  body_name: "paddle"
  site_name: "paddle_contact"
  
  # Paddle dimensions (from scene.xml)
  blade_dimensions: [0.157, 0.152, 0.0065]  # length, width, thickness
  mass: 0.09  # kg
  
  # Offset from link8 to paddle center
  offset_from_link8: [0.0, 0.0, 0.157]