# MuJoCo Simulation Configuration

mujoco:
  timestep: 0.001  # 1ms = 1000 Hz simulation
  iterations: 100
  solver: "Newton"
  tolerance: 1.0e-10
  
  gravity: [0.0, 0.0, -9.81]

ball:
  # Official table tennis ball specifications
  radius: 0.020  # 40mm diameter
  mass: 0.0027   # 2.7 grams
  
  # Physics properties
  restitution: 0.95
  friction: [0.5, 0.005, 0.0001]
  
  # Contact dynamics
  solref: [0.002, 1.0]
  solimp: [0.90, 0.95, 0.001]
  condim: 4
  
  # Spawning configuration
  # RL reset behavior:
  # - If tested_initial_states is non-empty, each episode samples one entry.
  # - Otherwise, the range-based random spawn below is used.
  # Populate this list with pre-validated states to avoid invalid first bounces.
  # Two-bounce serve trajectories — ball starts from the opponent's end (x < 0),
  # bounces once on the opponent's table side, crosses the net, bounces once on
  # the robot's side, then the robot returns it.  This gives the policy more
  # time to estimate the interception point and orient the paddle.
  #
  # Verified analytically (COR≈0.95, g=9.81, ball_radius=0.02 m, TABLE_Z=0.7725):
  #   bounce 1 (opponent side, x<0): catches ball after it clears the net
  #   bounce 2 (robot side, 0<x<1.37): gives robot time to intercept at x≈0.5–0.8
  #   net clearance: ball crosses x=0 at z > 0.925 m (net top height)
  tested_initial_states:
    # Verified 2-bounce serve trajectories (see validate_serve_trajectory in test_comprehensive.py).
    - position: [-1.5, 0.0, 1.7]
      velocity: [2.5, 0.0, 0.0]
      spin: [0.0, 0.0, 0.0]
    - position: [-1.5, -0.5, 1.7]
      velocity: [2.5, 0.0, 0.0]
      spin: [0.0, 0.0, 0.0]
    - position: [-1.5, 0.5, 1.7]
      velocity: [2.5, 0.0, 0.0]
      spin: [0.0, 0.0, 0.0]
    - position: [-1.5, -0.5, 1.7]
      velocity: [2.5, 1.0, 0.0]
      spin: [0.0, 0.0, 0.0]
    - position: [-1.5, 0.5, 1.7]
      velocity: [2.5, -1.0, 0.0]
      spin: [0.0, 0.0, 0.0]

  spawn_height_range: [0.9, 2.0]
  spawn_x_range: [0.0, 0.0]
  spawn_y_range: [-0.5, 0.5]
  
  # Initial velocity ranges (m/s)
  velocity_x_range: [1.2, 2.0]
  velocity_y_range: [0.0, 0.0]
  velocity_z_range: [0.0, 0.0]
  
  # Spin ranges (rad/s)
  spin_x_range: [0.0, 0.0]
  spin_y_range: [0.0, 0.0]
  spin_z_range: [0.0, 0.0]

  # Termination conditions
  # NOTE: must be < gravity*timestep (9.81*0.001=0.00981) so a
  # ball starting at rest can begin falling before termination triggers.
  min_velocity_threshold: 0.001
  ground_z_threshold: 0.01
  max_episode_time: 10.0
  out_of_bounds_distance: 5.0

table:
  length: 2.74
  width: 1.525
  height: 0.76
  restitution: 0.8
  friction: [0.45, 0.005, 0.0001]
  position: [0.0, 0.0, 0.76]
  # Empirical coefficient of restitution used by the analytical trajectory
  # predictor (separate from MuJoCo's restitution which drives the physics).
  # Measured from simulation: ball-table solref damratio=0.16 gives COR ≈ 0.58
  # (speed-dependent: ~0.59 at high-speed bounce 1, ~0.57 at lower-speed bounce 2).
  bounce_cor: 0.58

visualization:
  camera: "main_view"
  render_fps: 60
  available_cameras:
    - "main_view"
    - "side_view"
    - "top_view"
    - "robot_view"