# RL Training Configuration
# Used by scripts/train_rl.py and scripts/run_sweep.py

# ── Environment ────────────────────────────────────────────────────
env:
  scene_xml:      "assets/scene.xml"
  sim_cfg_path:   "config/simulation.yaml"
  robot_cfg_path: "config/robot.yaml"
  randomize:      true
  action_repeat:  20          # 20 × 1 ms = 50 Hz policy

# ── Action / observation mode ──────────────────────────────────────
# "task_space"  → 10-D action: [x,y,z, t, nx,ny,nz, vx,vy,vz]
# In the current control pipeline, when [vx,vy,vz] is non-zero the desired
# paddle normal is derived as -normalize([vx,vy,vz]). The explicit [nx,ny,nz]
# is used as a fallback only when impact velocity is near zero.
# "joint_space" → 7-D action: normalised joint targets ∈ [-1,1]
mode: "task_space"

# ── Training ───────────────────────────────────────────────────────
training:
  total_timesteps: 2000000
  eval_episodes: 50
  eval_freq: 5000       # policy steps between evaluations
  n_envs: 1            # parallel envs (increase for PPO)
  seed: 42

# ── Logging ────────────────────────────────────────────────────────
logging:
  log_dir: "results"        # base dir; each run gets a sub-folder
  save_freq: 5000         # checkpoint every N policy steps

# ── Algorithms (SB3 / sb3-contrib) ────────────────────────────────
# Supported: PPO, SAC, TD3, DDPG, A2C, TQC, RecurrentPPO
algorithms:
  - PPO
  - SAC
  - TD3
  - TQC
  - RecurrentPPO

# ── Algorithm-specific hyper-parameters ───────────────────────────
# Values shown are good starting points; tune per algorithm.
hyperparams:
  PPO:
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0
    vf_coef: 0.5
    max_grad_norm: 0.5
    policy: "MlpPolicy"

  SAC:
    learning_rate: 3.0e-4
    buffer_size: 1_000_000
    learning_starts: 10_000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    train_freq: 1
    gradient_steps: 1
    policy: "MlpPolicy"

  TD3:
    learning_rate: 1.0e-3
    buffer_size: 1_000_000
    learning_starts: 10_000
    batch_size: 100
    tau: 0.005
    gamma: 0.99
    train_freq: 1
    gradient_steps: 1
    policy_delay: 2
    policy: "MlpPolicy"

  TQC:
    learning_rate: 3.0e-4
    buffer_size: 1000000
    learning_starts: 10000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    policy: "MlpPolicy"
    top_quantiles_to_drop_per_net: 2

  RecurrentPPO:
    learning_rate: 1.0e-4
    n_steps: 128
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    policy: "MlpLstmPolicy"

# ── Control stack components ───────────────────────────────────────
# Available IK solvers (only used in task_space mode)
ik_solvers:
  - NumericalIKSolver
  - JacobianIKSolver

# Available trajectory planners
trajectory_planners:
  - MinimumJerkTrajectory
  - CubicSplineTrajectory
  - BSplineTrajectory
  - TrapezoidalVelocityTrajectory
